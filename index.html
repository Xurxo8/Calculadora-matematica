<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta content="autor" name="Xurxo Freitas">
  <!-- ESTILOS -->
   <link rel="stylesheet" href="./css/estilos.css">
  <title>Calculadora</title>
</head>
<body>
  <div id="calculadora">
    <input id="pantalla">
    <!-- <hr> -->
    <div id="teclado">
      <button id="boton_borrarTodo" class="boton">AC</button>
      <button id="boton_parentese" class="boton">()</button>
      <button id="boton_porcentaxe" class="boton">&#37;</button> <!-- Porcentaxe -->
      <button id="boton_buttonision" class="boton">&divide;</button> <!-- dividir -->
      <button id="boton_sete" class="boton">7</button>
      <button id="boton_oito" class="boton">8</button>
      <button id="boton_nove" class="boton">9</button>
      <button id="boton_multiplicacion" class="boton">X</button>
      <button id="boton_catro" class="boton">4</button>
      <button id="boton_cinco" class="boton">5</button>
      <button id="boton_seis" class="boton">6</button>
      <button id="boton_restar" class="boton">&ndash;</button>
      <button id="boton_un" class="boton">1</button>
      <button id="boton_dous" class="boton">2</button>
      <button id="boton_tres" class="boton">3</button>
      <button id="boton_sumar" class="boton">+</button>
      <button id="boton_cero" class="boton">0</button>
      <button id="boton_punto" class="boton">.</button>
      <!-- <button id="boton_borrar" class="boton"><img src="./img/delete-left-solid-full.svg" alt="icono_borrar"></button> -->
      <button id="boton_borrar" class="boton">(-)</button>
      <button id="boton_igual" class="boton">=</button>
    </div>
  </div>
</body>
</html>
