<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta content="autor" name="Xurxo Freitas">
  <!-- ENLACE FICHEIROS JS -->
   <script src="./js/jquery_v4.0.0.js"></script>
   <script src="./js/index.js"></script>
  <!-- ESTILOS -->
   <link rel="stylesheet" href="./css/estilos.css">
  <title>Calculadora</title>
</head>
<body>
  <div id="calculadora">
    <input id="pantalla">
    <!-- <hr> -->
    <div id="teclado">
      <button id="borrarTodo" class="boton">AC</button>
      <button id="parentese" class="boton">()</button>
      <button id="porcentaxe" class="boton">&#37;</button> <!-- Porcentaxe -->
      <button id="buttonision" class="boton">&divide;</button> <!-- dividir -->
      <button id="sete" class="boton">7</button>
      <button id="oito" class="boton">8</button>
      <button id="nove" class="boton">9</button>
      <button id="multiplicacion" class="boton">X</button>
      <button id="catro" class="boton">4</button>
      <button id="cinco" class="boton">5</button>
      <button id="seis" class="boton">6</button>
      <button id="restar" class="boton">&ndash;</button>
      <button id="un" class="boton">1</button>
      <button id="dous" class="boton">2</button>
      <button id="tres" class="boton">3</button>
      <button id="sumar" class="boton">+</button>
      <button id="cero" class="boton">0</button>
      <button id="punto" class="boton">.</button>
      <button id="borrar" class="boton"><img src="./img/delete-left-solid-full.svg" alt="icono_borrar"></button>
      <button id="igual" class="boton">=</button>
    </div>
  </div>
</body>
</html>
