<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta content="autor" name="Xurxo Freitas">
  <!-- ENLACE FICHEIROS JS -->
   <script src="./js/jquery_v4.0.0.js"></script>
   <script src="./js/index.js"></script>
  <!-- ESTILOS -->
   <link rel="stylesheet" href="./css/estilos.css">
  <title>Calculadora</title>
</head>
<body>
  <div id="calculadora">
    <input id="pantalla">
    <!-- <hr> -->
    <div id="teclado">
      <button class="boton" id="borrarTodo" >AC</button>
      <button class="boton" id="parentese" >()</button>
      <button class="boton" id="porcentaxe" >&#37;</button> <!-- Porcentaxe -->
      <button class="boton" id="division">&divide;</button> <!-- dividir -->
      <button class="boton numero">7</button>
      <button class="boton numero">8</button>
      <button class="boton numero">9</button>
      <button class="boton" id="multiplicacion">X</button>
      <button class="boton numero">4</button>
      <button class="boton numero">5</button>
      <button class="boton numero">6</button>
      <button class="boton" id="restar" class="boton">&ndash;</button>
      <button class="boton numero">1</button>
      <button class="boton numero">2</button>
      <button class="boton numero">3</button>
      <button class="boton" id="sumar">+</button>
      <button class="boton numero">0</button>
      <button class="boton numero">.</button>
      <button class="boton" id="borrar" ><img src="./img/delete-left-solid-full.svg" alt="icono_borrar"></button>
      <button class="boton" id="igual">=</button>
    </div>
  </div>
</body>
</html>
